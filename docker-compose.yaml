version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=bakr
      - RABBITMQ_DEFAULT_PASS=bakr1234

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=bakr
      - POSTGRES_PASSWORD=bakr1234
      - POSTGRES_DB=iot_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  auth_service:
    build: ./signing
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis

  device_management:
    build: ./device-management
    ports:
      - "5001:5001"
    depends_on:
      - postgres
      - rabbitmq

  monitoring_service:
    build: ./monitoring
    ports:
      - "5002:5002"
    depends_on:
      - mongodb
      - rabbitmq

volumes:
  mongodb_data:
  postgres_data: