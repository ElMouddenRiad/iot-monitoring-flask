version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=iot_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
    - iot_network

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - iot_network

  auth_service:
    build: ./signing
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis

  device_management:
    build: ./device_management
    container_name: device_management
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: iot_platform
    ports:
      - "5001:5001"
    depends_on:
      - postgres
      - rabbitmq

  monitoring_service:
    build: ./monitoring
    ports:
      - "5002:5002"
    depends_on:
      - mongodb
      - rabbitmq

networks:
  iot_network:
    driver: bridge

volumes:
  mongodb_data:
  postgres_data: