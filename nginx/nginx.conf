events {}

http {
    upstream signing_service {
        server signing_service:5001;
    }

    upstream device_management_service {
        server device_management_service:5002;
    }

    upstream monitoring_service {
        server monitoring_service:5003;
    }

    server {
        listen 80;

        location /auth/ {
            proxy_pass http://signing_service/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/monitoring/ {
            proxy_pass http://monitoring_service/api/monitoring/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /socket.io/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_pass http://monitoring_service/socket.io/;
        }

        location = /health/signing {
            proxy_pass http://signing_service/health;
        }

        location = /health/device-management {
            proxy_pass http://device_management_service/health;
        }

        location = /health/monitoring {
            proxy_pass http://monitoring_service/health;
        }

        location = /predict_device {
            proxy_pass http://device_management_service/predict_device;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://device_management_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
