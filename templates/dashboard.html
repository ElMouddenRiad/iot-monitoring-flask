<!DOCTYPE html>
<html>
<head>
    <title>IoT Temperature Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

</head>
<body>
    <div class="container">
        <h1>IoT Temperature Dashboard</h1>
        
        <div class="card">
            <h2>Device Management</h2>
            <div class="device-controls">
                <input type="text" id="search-device" placeholder="Search devices...">
                <button class="btn-primary" onclick="showAddDeviceModal()">Add Device</button>
            </div>
            <div class="device-list" id="device-list">
                <!-- Devices will be listed here -->
            </div>
        </div>
        
        <div class="card">
            <h2>Latest Temperature Readings</h2>
            <div id="temperature-chart"></div>
        </div>
        
        <div class="card">
            <h2>Statistics</h2>
            <div id="stats"></div>
        </div>

        <div class="card">
            <h2>Device Locations</h2>
            <div id="map" style="height: 400px;"></div>
        </div>
    </div>

    <!-- Add/Edit Device Modal -->
    <div id="device-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Add Device</h2>
            <form id="device-form">
                <div class="form-group">
                    <label for="device-mac">MAC Address:</label>
                    <input type="text" id="device-mac" required>
                </div>
                <div class="form-group">
                    <label for="device-name">Name:</label>
                    <input type="text" id="device-name" required>
                </div>
                <div class="form-group">
                    <label for="device-latitude">Latitude:</label>
                    <input type="number" id="device-latitude" step="0.000001" required>
                </div>
                <div class="form-group">
                    <label for="device-longitude">Longitude:</label>
                    <input type="number" id="device-longitude" step="0.000001" required>
                </div>
                <button type="submit" class="btn-primary">Save</button>
                <button type="button" class="btn-secondary" onclick="hideDeviceModal()">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        let currentDevices = {};
        let selectedDevice = null;
        let socket = io();
        let map;
        let markers = {};

        // Initialize map
        function initMap() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Add click handler to map for adding new devices
            map.on('click', function(e) {
                if ($('#device-modal').is(':visible')) {
                    $('#device-latitude').val(e.latlng.lat.toFixed(6));
                    $('#device-longitude').val(e.latlng.lng.toFixed(6));
                }
            });
        }

        // Socket.IO event handlers
        socket.on('connect', () => {
            console.log('Connected to WebSocket');
        });

        socket.on('new_reading', (data) => {
            console.log('New reading received:', data);
            updateChartWithNewData(data);
            updateStatsWithNewData(data);
            updateMarkerPosition(data);
        });

        function updateMarkerPosition(data) {
            if (!data.location || !data.location.latitude || !data.location.longitude) return;

            if (!markers[data.device_id]) {
                markers[data.device_id] = L.marker([data.location.latitude, data.location.longitude])
                    .bindPopup(`Device: ${data.device_id}<br>Temperature: ${data.temperature}°C`)
                    .addTo(map);
            } else {
                markers[data.device_id]
                    .setLatLng([data.location.latitude, data.location.longitude])
                    .getPopup().setContent(`Device: ${data.device_id}<br>Temperature: ${data.temperature}°C`);
            }
        }

        function updateChartWithNewData(data) {
            console.log('Updating chart with:', data);
            if (!selectedDevice || selectedDevice === data.device_id) {
                const timestamp = new Date(data.timestamp).toLocaleTimeString();
                
                // Check if chart exists
                const chartDiv = document.getElementById('temperature-chart');
                if (!chartDiv.data) {
                    // Initialize chart if it doesn't exist
                    const trace = {
                        x: [timestamp],
                        y: [data.temperature],
                        type: 'scatter',
                        mode: 'lines+markers',
                        name: data.device_id
                    };
                    const layout = {
                        title: 'Temperature Readings',
                        xaxis: { title: 'Time' },
                        yaxis: { title: 'Temperature (°C)' }
                    };
                    Plotly.newPlot('temperature-chart', [trace], layout);
                } else {
                    // Update existing chart
                    Plotly.extendTraces('temperature-chart', {
                        x: [[timestamp]],
                        y: [[data.temperature]]
                    }, [0]);

                    // Keep only last 50 points
                    if (chartDiv.data[0].x.length > 50) {
                        Plotly.relayout('temperature-chart', {
                            xaxis: {
                                range: [
                                    chartDiv.data[0].x[chartDiv.data[0].x.length - 50],
                                    chartDiv.data[0].x[chartDiv.data[0].x.length - 1]
                                ]
                            }
                        });
                    }
                }
            }
        }

        function updateStatsWithNewData(data) {
            console.log('Updating stats with:', data);
            $.get('/api/stats', function(stats) {
                if (stats.error) {
                    $('#stats').html('<p>No data available</p>');
                    return;
                }
                
                $('#stats').html(`
                    <div class="stats-grid">
                        <div class="stat-item">
                            <h3>Current Reading</h3>
                            <p>Device ID: ${data.device_id}</p>
                            <p>Temperature: ${data.temperature}°C</p>
                            <p>Time: ${new Date(data.timestamp).toLocaleString()}</p>
                        </div>
                        <div class="stat-item">
                            <h3>Statistics</h3>
                            <p>Average: ${stats.average_temp}°C</p>
                            <p>Maximum: ${stats.max_temp}°C</p>
                            <p>Minimum: ${stats.min_temp}°C</p>
                            <p>Total Readings: ${stats.num_readings}</p>
                        </div>
                    </div>
                `);
            });
        }

        function updateChart() {
            $.get('/api/data', function(data) {
                console.log('Fetched historical data:', data);
                const traces = {};
                
                // Group data by device
                data.forEach(reading => {
                    if (!traces[reading.device_id]) {
                        traces[reading.device_id] = {
                            x: [],
                            y: [],
                            type: 'scatter',
                            mode: 'lines+markers',
                            name: reading.device_id
                        };
                    }
                    traces[reading.device_id].x.push(new Date(reading.timestamp).toLocaleTimeString());
                    traces[reading.device_id].y.push(reading.temperature);
                });

                const layout = {
                    title: 'Temperature Readings',
                    xaxis: { title: 'Time' },
                    yaxis: { title: 'Temperature (°C)' }
                };

                Plotly.newPlot('temperature-chart', Object.values(traces), layout);
            });
        }

        function loadDevices(searchTerm = '') {
            $.get(`/api/devices${searchTerm ? '?search=' + searchTerm : ''}`, function(devices) {
                currentDevices = devices;
                renderDeviceList();
                
                // Update map with all devices
                Object.entries(devices).forEach(([mac, device]) => {
                    device.mac = mac; // Ensure MAC is included in device object
                    updateDeviceMarker(device);
                });

                // Fit map bounds to show all markers if there are any
                if (Object.keys(markers).length > 0) {
                    const markerBounds = L.featureGroup(Object.values(markers)).getBounds();
                    map.fitBounds(markerBounds, { padding: [50, 50] });
                }
            });
        }
        function updateDeviceMarker(device) {
        if (!device.location || !device.location.latitude || !device.location.longitude) return;

        const markerContent = `
            <strong>${device.name}</strong><br>
            MAC: ${device.mac}<br>
            Status: ${device.status}
        `;

        if (!markers[device.mac]) {
            // Create new marker
            markers[device.mac] = L.marker([device.location.latitude, device.location.longitude])
                .bindPopup(markerContent)
                .addTo(map);
        } else {
            // Update existing marker
            markers[device.mac]
                .setLatLng([device.location.latitude, device.location.longitude])
                .getPopup().setContent(markerContent);
        }
    }

        function renderDeviceList() {
            const deviceList = $('#device-list');
            deviceList.empty();
            
            Object.entries(currentDevices).forEach(([mac, device]) => {
                const isSelected = selectedDevice === mac;
                deviceList.append(`
                    <div class="device-item ${isSelected ? 'selected' : ''}" data-mac="${mac}">
                        <div>
                            <strong>${device.name}</strong>
                            <br>
                            <small>${mac}</small>
                            <br>
                            <small>Status: ${device.status}</small>
                        </div>
                        <div>
                            <button class="btn-primary" onclick="selectDevice('${mac}')">View</button>
                            <button class="btn-secondary" onclick="editDevice('${mac}')">Edit</button>
                            <button class="btn-danger" onclick="deleteDevice('${mac}')">Delete</button>
                        </div>
                    </div>
                `);
            });
        }

        // Device management functions
        function showAddDeviceModal() {
            $('#modal-title').text('Add Device');
            $('#device-form')[0].reset();
            $('#device-mac').prop('readonly', false);
            $('#device-modal').show();
        }

        function hideDeviceModal() {
            $('#device-modal').hide();
        }

        function editDevice(mac) {
            const device = currentDevices[mac];
            $('#modal-title').text('Edit Device');
            $('#device-mac').val(mac).prop('readonly', true);
            $('#device-name').val(device.name);
            $('#device-latitude').val(device.location.latitude);
            $('#device-longitude').val(device.location.longitude);
            $('#device-modal').show();
        }

        function deleteDevice(mac) {
            if (confirm('Are you sure you want to delete this device?')) {
                $.ajax({
                    url: `/api/devices/${mac}`,
                    method: 'DELETE',
                    success: function() {
                        loadDevices();
                        if (selectedDevice === mac) {
                            selectedDevice = null;
                            updateChart();
                        }
                    }
                });
            }
        }

        function selectDevice(mac) {
            selectedDevice = mac;
            renderDeviceList();
            updateChart();
        }

        // Event handlers
        $('#device-form').submit(function(e) {
            e.preventDefault();
            
            const deviceData = {
                mac: $('#device-mac').val(),
                name: $('#device-name').val(),
                location: {
                    latitude: parseFloat($('#device-latitude').val()),
                    longitude: parseFloat($('#device-longitude').val())
                }
            };

            const isEdit = $('#device-mac').prop('readonly');
            const method = isEdit ? 'PUT' : 'POST';
            const url = isEdit ? `/api/devices/${deviceData.mac}` : '/api/devices';

            $.ajax({
                url: url,
                method: method,
                contentType: 'application/json',
                data: JSON.stringify(deviceData),
                success: function(response) {
                    hideDeviceModal();
                    loadDevices();
                    
                    // Update or add marker for the new/edited device
                    deviceData.mac = deviceData.mac;
                    deviceData.status = 'active';
                    updateDeviceMarker(deviceData);
                    
                    // Center map on the new/edited device
                    map.setView([deviceData.location.latitude, deviceData.location.longitude], 13);
                }
            });
        });

        $('#search-device').on('input', function() {
            loadDevices($(this).val());
        });

        // Initialize everything when document is ready
        $(document).ready(function() {
            initMap();
            loadDevices();
            updateChart();

            // Update data periodically
            setInterval(() => {
                updateChart();
                $.get('/api/stats', function(stats) {
                    if (!stats.error) {
                        updateStatsWithNewData({
                            device_id: selectedDevice || 'All Devices',
                            temperature: stats.average_temp,
                            timestamp: stats.last_updated
                        });
                    }
                });
            }, 10000);
        });
    </script>
</body>
</html>
